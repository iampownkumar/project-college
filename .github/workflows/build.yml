name: Build Windows Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Get dependencies
        run: |
          cd lab-exam-client
          flutter pub get

      - name: Build Windows Executable
        run: |
          cd lab-exam-client
          flutter build windows

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lab-exam-client-windows
          path: lab-exam-client/build/windows/x64/runner/Release/
