name: Build Windows Client

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.5'
          channel: 'stable'

      - name: Get dependencies
        run: |
          cd lab-exam-client
          flutter pub get

      - name: Build Windows Executable
        run: |
          cd lab-exam-client
          flutter build windows

      - name: Package Windows Build into Zip
        run: |
          Compress-Archive -Path lab-exam-client/build/windows/x64/runner/Release/* -DestinationPath lab-exam-client-windows.zip
        shell: pwsh

      - name: Create Release and Upload Windows Client
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Windows Client Build"
          body: "Automated rolling build of the Windows client application."
          files: lab-exam-client-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
