name: lab_exam_client
description: Lab Exam Client - Student Flutter Desktop App for Koreliurm Labs
version: 1.0.0+1
publish_to: none

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1

  # Code Editor (full featured with syntax highlight + line numbers)
  re_editor: ^0.8.0
  re_highlight: ^0.0.3

  # Window management (fullscreen, title bar control)
  window_manager: ^0.3.9

  # File system paths
  path_provider: ^2.1.4

  # Local persistence / autosave
  shared_preferences: ^2.3.2

  # Network connectivity indicator
  connectivity_plus: ^6.0.5

  # State management
  provider: ^6.1.2

  # Resizable split pane layout
  multi_split_view: ^3.0.0

  # Date/time formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - config/app_config.json
